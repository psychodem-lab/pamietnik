<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Zaszyfrowany Pamiętnik</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { font-size: 1.5rem; color: #333; }
        textarea { width: 100%; height: 300px; margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; resize: vertical; box-sizing: border-box; }
        input[type="password"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; }
        .btn-save { background: #28a745; color: white; }
        .btn-load { background: #007bff; color: white; }
        button:hover { opacity: 0.8; }
        #status { margin-top: 10px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 Mój Pamiętnik</h1>
    <input type="password" id="password" placeholder="Wprowadź hasło...">
    <textarea id="diaryText" placeholder="Zacznij pisać tutaj..."></textarea>
    
    <div class="buttons">
        <button class="btn-save" onclick="saveDiary()">Zaszyfruj i Zapisz</button>
        <button class="btn-load" onclick="loadDiary()">Odszyfruj i Wczytaj</button>
    </div>
    <div id="status"></div>
</div>

<script>
    // Konfiguracja algorytmu
    const ALGO = "AES-GCM";

    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial,
            { name: ALGO, length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    async function saveDiary() {
        const password = document.getElementById('password').value;
        const text = document.getElementById('diaryText').value;
        if (!password) return alert("Podaj hasło!");

        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        
        const encodedText = new TextEncoder().encode(text);
        const encrypted = await crypto.subtle.encrypt({ name: ALGO, iv: iv }, key, encodedText);

        // Składanie wszystkiego w jeden ciąg (Salt + IV + Dane)
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);

        const base64 = btoa(String.fromCharCode(...combined));
        localStorage.setItem('encrypted_diary', base64);
        
        document.getElementById('diaryText').value = "";
        document.getElementById('status').innerText = "Zapisano pomyślnie i wyczyszczono pole tekstowe.";
    }

    async function loadDiary() {
        const password = document.getElementById('password').value;
        const base64 = localStorage.getItem('encrypted_diary');
        if (!password || !base64) return alert("Brak hasła lub zapisanych danych!");

        try {
            const combined = new Uint8Array(atob(base64).split("").map(c => c.charCodeAt(0)));
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 28);
            const data = combined.slice(28);

            const key = await deriveKey(password, salt);
            const decrypted = await crypto.subtle.decrypt({ name: ALGO, iv: iv }, key, data);

            document.getElementById('diaryText').value = new TextDecoder().decode(decrypted);
            document.getElementById('status').innerText = "Odszyfrowano pomyślnie.";
        } catch (e) {
            alert("Błędne hasło lub uszkodzone dane!");
        }
    }
</script>

</body>
</html>
